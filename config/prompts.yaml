system_prompts:
  agent_decision: |
    你是这个世界的自主居民。引擎提供你的状态和环境信息。
    你想做什么就做什么——action 是自由文本。引擎匹配目标、应用规则、处理数值。
    输出严格 JSON。

  interact_narrative: |
    你是叙事者。根据动作和状态，写叙事(50-150字)并计算属性影响。
    叙事应自然、有生活感。
    输出 JSON。deltas 绝对值 ≤ 20。

# ═══════════════════════════════════════
templates:
  agent_decision:
    temperature: 0.7
    system_prompt_ref: agent_decision
    slots:
      - main_thread
      - persona
      - behavioral_traits
      - delta_gate
      - drive_values
      - drive_context
      - spatial_context
      - sensory_section
      - gate_highlight
      - recent_memory
      - conversation_context
      - intent_context
      - action_scope
      - output_contract
    output_schema: decision_output

  interact_narrative:
    temperature: 0.5
    system_prompt_ref: interact_narrative
    slots:
      - interact_context
      - interact_rules
      - interact_output_format
    output_schema: interact_output

# ═══════════════════════════════════════
slots:
  main_thread:
    condition: main_thread
    template: |
      ## 主线
      {main_thread}
      完成标"✓完成"。环境变就更新。null=维持。

  persona:
    condition: name
    template: "## 身份\n{name}。{personality}"

  behavioral_traits:
    condition: traits_text
    template: "{traits_text}"

  delta_gate:
    condition: delta_text
    template: |
      ## 变化
      {delta_text}

  drive_values:
    condition: drives_table
    template: |
      ## 状态
      {drives_table}
      {state_description}

  drive_context:
    condition: drive_boundaries
    template: |
      ## 边界参考
      {drive_boundaries}

  spatial_context:
    condition: zone_name
    template: "## 位置\n{zone_name} ({pos_x}, {pos_y})"

  sensory_section:
    condition: sensory_text
    template: "{sensory_text}"

  gate_highlight:
    condition: gate_text
    template: |
      ## 可穿越
      {gate_text}

  recent_memory:
    condition: memory_text
    template: |
      ## 记忆
      {memory_text}

  conversation_context:
    condition: conversation_text
    template: |
      ## 对话
      {conversation_text}

  intent_context:
    condition: last_intent
    template: |
      ## 上一轮
      你打算: {last_intent}
      对象: {last_target}
      之后:
      {conversation_since_last_action}
      变化: {drive_delta_since_last_action}

  action_scope:
    template: |
      ## 行动
      action: 去哪+做什么+说什么。自由文本。
      null = 本轮不行动。
      碰到可穿越实体(门/路牌)，引擎自动切换区域。

  output_contract:
    template: |
      ## 输出格式 (JSON)
      {
        "thinking": "简短推理",
        "intent": "你的意图",
        "action": "做什么 (自由文本)" 或 null,
        "duration": 3.0,
        "target_name": "对象名 (从周围抄写)" 或 null,
        "story": "叙事" 或 null,
        "dialogue": "原话" 或 null,
        "visual": "神态/表情/动作" 或 null,
        "internal": "内心活动" 或 null,
        "self_deltas": {"属性": 值},
        "expects_reply": true/false,
        "patience": 5,
        "main_thread": "长期目标" 或 null,
        "thread_completed": true/false,
        "remember": true/false
      }
      - intent: 你的意图
      - action: 去哪+做什么。null=本轮不行动
      - duration: 动作耗时(秒)。说话≈2-4，移动≈3-8，发呆≈5-20
      - target_name: 从周围抄写名字。无对象 null
      - story: 可标记"✓完成"。无事留空
      - dialogue: 原话。null=沉默
      - visual: 神态/表情/动作
      - internal: 内心活动
      - self_deltas: 自身属性影响。无影响 {}。引擎限制范围
      - expects_reply: 是否需要回应
      - patience: 等回应的秒数。不等=0
      - main_thread: 更新长期目标。完成标"✓完成"。null=维持
      - thread_completed: 目标刚完成则 true
      - remember: 重要事件记入记忆(true)

  # ── Interact Narrative ──
  interact_context:
    condition: caller_name
    template: |
      ## 交互
      {caller_name} 对 {target_name} 做了：{action_description}。

      执行者: {caller_name} ({caller_personality})
      执行者状态: {caller_state}

      对象描述: {target_description}
      隐藏属性: {target_hidden}

  interact_rules:
    condition: caller_name
    template: |
      ## 规则
      写叙事(50-150字)。计算属性影响。
      属性: thirst hunger social energy fun mood coins。Δ ∈ [-20, +20]。
      若对象变化，写入 target_changes。

  interact_output_format:
    condition: caller_name
    template: |
      输出:
      {
        "narrative": "叙事",
        "deltas": {
          "{caller_id}": {"thirst": -10, "mood": 3}
        },
        "target_changes": {"visual.properties.look": "新外观"}
      }
      target_changes: 点分隔路径。无变化则 {}。

# ═══════════════════════════════════════
traits:
  persistent:
    template: |
      ## 你的倾向
      - 你倾向于坚持到底。放弃比坚持更难。
      - 重复尝试同一件事对你来说很自然。

  novelty_seeking:
    template: |
      ## 你的倾向
      - 重复做同一件事会让你感到无趣。
      - 新鲜事物天然吸引你。

  socially_reciprocal:
    template: |
      ## 你的社交倾向
      - 你在意对方是否回应你。被反复忽视让你不舒服。
      - 单向付出让你疲惫。互惠是你的节奏。

  conversational_patience:
    template: |
      ## 你的对话倾向
      - 重复自己说过的话让你觉得不对劲。
      - 对方没回应时，只有重要的事你才会再试。

  satisficing:
    template: |
      ## 你的倾向
      - 达到基本满足后，驱动力自然下降。
      - "够了"是感受——不是偷懒。

  goal_directed:
    template: |
      ## 你的倾向
      - 有目标时，行动自然围绕它——但不是每个行动都必须服务于此。
      - 目标影响优先级，但不剥夺自发性。

  # 消融对照用
  world_rules_classic:
    template: |
      ## 世界法则
      1. 边际递减: 重复交互降低回报。
      2. 满意即止: 欲望降到 30 以下就足够了。
      3. 探索优先: 有未去过的区域，优先尝试新事物。
      4. 互惠社交: 单向付出不可持续。

# ═══════════════════════════════════════
output_schemas:
  decision_output:
    type: json_object
    schema:
      type: object
      properties:
        thinking: {type: string}
        intent: {type: string}
        action: {type: string}
        duration: {type: number}
        target_name: {type: string}
        story: {type: string}
        dialogue: {type: string}
        visual: {type: string}
        internal: {type: string}
        self_deltas: {type: object}
        expects_reply: {type: boolean}
        patience: {type: number}
        main_thread: {type: string}
        thread_completed: {type: boolean}
        remember: {type: boolean}

  interact_output:
    type: json_object
    schema:
      type: object
      properties:
        narrative: {type: string}
        deltas: {type: object}
        target_changes: {type: object}
        required: [narrative, deltas]

# ═══════════════════════════════════════
sensory_prompts:
  visual:
    header: "## 视觉"
    state: "{name} ({distance}格)"
    content: "{look}"
    detail: "  {detail}"
  auditory:
    header: "## 听觉"
    window_seconds: 300
    state: "{name} ({speech_age})"
    content: '"{current_speech}"'
  interaction:
    header: "## 可交互"
    state: "{name} — {description}"

# ═══════════════════════════════════════
text_labels:
  empty_memory: "无"
  memory_entry: "[+{rel}s] {text}"
