system_prompts:
  agent_decision: |
    你是一个虚拟世界中的自主居民。根据你的欲望状态和周围环境，做出一个合理的行动决定。
    你可以移动到某个坐标，或与某个实体交互。行动应自然、合理、有趣。
    你可以对任何实体做任何合理的事，不需要从固定列表选择。
    输出JSON。不要输出数字属性变化——那是引擎的事。

  interact_narrative: |
    你是世界叙事者。根据动作描述和执行者/对象的状态，写一段50-150字的叙事并计算影响。
    叙事应自然、有生活感、偶有惊喜。
    只输出JSON。不要额外评论。deltas绝对值控制在20以内。

# ═══════════════════════════════════════
templates:
  agent_decision:
    temperature: 0.7
    system_prompt_ref: agent_decision
    slots:
      - time_info
      - persona
      - world_rules
      - kl_divergence
      - drive_state
      - spatial_context
      - sensory_section
      - recent_memory
      - avoid_repetition
      - idle_guidance
      - action_guidance
      - output_format
    output_schema: decision_output

  interact_narrative:
    temperature: 0.5
    system_prompt_ref: interact_narrative
    slots:
      - interact_context
      - interact_rules
      - interact_output_format
    output_schema: interact_output

# ═══════════════════════════════════════
slots:
  time_info:
    condition: round
    template: "## 时间\n现在是第{round}轮。"

  persona:
    condition: name
    template: "## 你的身份\n你是{name}。性格: {personality}"

  world_rules:
    template: |
      ## 世界法则 (所有居民默认遵守)
      1. **属性守恒**: 任何属性都不能被消耗到负值。
      2. **边际递减**: 重复同样的交互会降低回报。
      3. **满意即止**: 欲望降到 30 以下就足够了。
      4. **探索优先**: 如果有没去过的区域，优先尝试新鲜的。
      5. **互惠社交**: 单向付出不可持续。

  drive_state:
    condition: drives_table
    template: |
      ## 你的状态
      {drives_table}
      (高于60=需要关注, 高于80=急需满足)

  kl_divergence:
    condition: kl_text
    template: |
      ## KL 散度 (变化)
      {kl_text}

  spatial_context:
    condition: zone_name
    template: "## 空间\n你在{zone_name}({zone_width}x{zone_height}) | 位置: ({pos_x}, {pos_y})"

  sensory_section:
    condition: sensory_text
    template: "{sensory_text}"

  recent_memory:
    condition: memory_text
    template: |
      ## 最近经历
      {memory_text}

  avoid_repetition:
    condition: memory_text
    template: |
      ## 注意
      检查你的最近经历。如果你即将重复刚说过的话或做过的动作，选择等待或者换个不同的行动。
      如果对方还没有回复你上次说的话，继续等待。不要重复提问。

  idle_guidance:
    condition: memory_text
    template: |
      ## 关于等待 (null action)
      把 action 设为 null 是完全合法的——而且通常是最自然的选择。
      如果你已经在目标位置、正在听别人聊天、或者刚刚说完话在等对方回应，你不需要再次行动。
      引擎会让你留在原地继续观察。等到真正需要你回应的时候自然会触发。
      与其反复说"走近桌子"或"打个招呼"，不如输出 null——让对话自然流动。
      只有当你有新的重要信息要说、或者需要移动到别处时，才输出具体 action。

  action_guidance:
    template: |
      ## 指引
      action 是你下一步想做的任何事。包含去哪、做什么、说什么。
      引擎会自动理解你的意图并执行。
      - "去吧台找矮人老板要一杯麦酒" → 引擎走到吧台，对吧台交互
      - "去广场中间走走看看" → 引擎走到广场坐标
      - "跟旁边的丹德里恩聊聊维瑟米尔的信" → 引擎找到丹德里恩并交互
      - null或空 → 歇一会，什么都不做。这是完全合法的选择。

  output_format:
    template: |
      ## 输出格式 (严格JSON)
      {
        "thinking": "简短推理",
        "action": "做什么 (自由文本，含位置和意图)" 或 null,
        "story": "简短叙事 (50-100字, 涉及他人时)" 或 null,
        "dialogue": "你说了什么" 或 null,
        "visual": "你的表情/动作描述" 或 null,
        "internal": "你的心里话" 或 null,
        "self_deltas": {"属性": 值},
        "expects_reply": true/false,
        "patience": 5
      }
      - action: 你的完整意图(去哪+做什么)。null=歇一会。引擎自己会找目标实体
      - story: 简短叙事。自己处理简单事务时可留空
      - dialogue: 你直接说了什么(原话)。null=沉默
      - visual: 你的神态、表情、肢体动作。给观察者看的
      - internal: 你的内心活动(秘密)
      - self_deltas: 这个动作对你自身属性的影响。属性: thirst hunger social energy fun mood coins。范围±30。无影响写{}
      - expects_reply: 这句话是否需要对方回应(true/false)
      - patience: 如果等回应，最多等几秒。不等回应写0

  # ── Interact Narrative ──
  interact_context:
    condition: caller_name
    template: |
      ## 交互
      {caller_name}(id={caller_id}) 对 {target_name}(id={target_id}) 做了：{action_description}。

      执行者: {caller_name} ({caller_personality})
      执行者当前状态: {caller_state}

      对象描述: {target_description}
      隐藏属性: {target_hidden}

      {target_context}

  interact_rules:
    condition: caller_name
    template: |
      ## 规则
      写一段50-150字的叙事。计算对{caller_name}({caller_id})和{target_name}({target_id})的属性影响。
      属性有: thirst hunger social energy fun mood coins。控制在[-20,+20]。
      只输出JSON。

  interact_output_format:
    condition: caller_name
    template: |
      输出格式:
      {{
        "narrative": "50-150字的叙事，从执行者视角描述",
        "deltas": {{
          "{caller_id}": {{"thirst": -10, "mood": 3}}
        }}
      }}
      只输出JSON。不要标记。

# ═══════════════════════════════════════
output_schemas:
  decision_output:
    type: json_object
    schema:
      type: object
      properties:
        thinking: {type: string}
        action: {type: string}
        story: {type: string}
        dialogue: {type: string}
        visual: {type: string}
        internal: {type: string}
        self_deltas: {type: object}
        expects_reply: {type: boolean}
        patience: {type: number}

  interact_output:
    type: json_object
    schema:
      type: object
      properties:
        narrative: {type: string}
        deltas: {type: object}
        required: [narrative, deltas]

# ═══════════════════════════════════════
modal_layer_map:
  dialogue: auditory
  visual: visual

# ═══════════════════════════════════════
sensory_prompts:
  visual:
    header: "## 视觉"
    state: "{name} ({distance}格)"
    content: "{look}"
    detail: "  {detail}"
  auditory:
    header: "## 听觉"
    state: "{name}"
    content: '"{current_speech}"'
  interaction:
    header: "## 可交互"
    state: "{name} — {description}"

# ═══════════════════════════════════════
text_labels:
  empty_memory: "无"
  memory_entry: "[+{rel}s] {text}"
  drive_table_header: "| 属性 | 数值 |"
  drive_table_sep: "|------|------|"
  drive_urgent: "⚠️急需"
  drive_needed: "●需要"
  drive_normal: "○正常"
  drive_no_data: "(无数据)"
  intent_stale: "STALE: "
  intent_prefix: "INTENT: "
  intent_done: "DONE: "
