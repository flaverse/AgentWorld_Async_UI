world:
  name: 猎魔人世界 - 白果园
  time_scale: 60
  start_time: 08:00
  world-group: full
  simulation:
    currency: coins
    poll_interval: 0.3
    stale_timeout: 30
    memory_prompt_count: 5
    default_patience: 5
    kl:
      state_thresholds:
      - 30
      - 60
      - 80
      coin_epsilon: 5
    drive:
      attributes:
        thirst:
          min: 0
          max: 100
          decay: 0.022
          description: 口渴。100=喉咙冒烟急需饮水。0=完全不渴。
        hunger:
          min: 0
          max: 100
          decay: 0.018
          description: 饥饿。100=体力不支需要进食。0=完全不饿。
        social:
          min: 0
          max: 100
          decay: 0.015
          description: 社交需求。100=极度渴望与人交流。0=只想独处。
        energy:
          min: 0
          max: 100
          decay: -0.01
          description: 体力。0=精疲力竭需休息。100=精力充沛。
        fun:
          min: 0
          max: 100
          decay: 0.015
          description: 娱乐。100=极度无聊需找乐子。0=已尽兴。
        mood:
          min: 0
          max: 100
          decay: 0.0
          description: 心情。0=绝望可能轻生或自毁。100=极度愉悦内心平静。
    validation:
      delta_max: 30
    text:
      kl_entered: '{channel}: {name} 进入'
      kl_left: '{channel}: {name} 离开'
      kl_changed: '{channel}: {name} 变化'
      kl_stale: 距上次行动已超过 {stale_timeout}s
      kl_coin: coins {sign}{delta}
      kl_state_cross: '{attr} {arrow}突破{t}'

traits:
  default: []

zones:
- id: bar_zone
  name: 狐狸与鹅酒馆
  width: 60
  height: 40
- id: village
  name: 白果园村与郊外
  width: 60
  height: 40
- id: garrison
  name: 尼弗迦德营地与草药小屋
  width: 40
  height: 30
entities:
- id: bar_village_gate
  name: 村口路牌
  zone: bar_zone
  pos:
  - 33
  - 18
  visual:
    visible_radius: 20
    properties:
      look: 歪斜木路牌指向白果园村
  interaction:
    interaction_radius: 5
    properties:
      description: 土路通往白果园村。水车磨坊的尖顶在远处可见。 【可穿越 → village】
    gate:
      to_zone: village
      to_pos:
      - 15
      - 38
  description: 歪斜木路牌，指向白果园村。
- id: village_bar_gate
  name: 酒馆路牌
  zone: village
  pos:
  - 32
  - 18
  visual:
    visible_radius: 20
    properties:
      look: 路牌指向狐狸与鹅酒馆方向
  interaction:
    interaction_radius: 5
    properties:
      description: 土路通向狐狸与鹅酒馆。远处传来麦酒香。 【可穿越 → bar_zone】
    gate:
      to_zone: bar_zone
      to_pos:
      - 44
      - 21
  description: 路牌指向酒馆方向。
- id: bar_garrison_gate
  name: 军营大门
  zone: bar_zone
  pos:
  - 27
  - 18
  visual:
    visible_radius: 20
    properties:
      look: 尼弗迦德军营的黑色铁门，挂着日轮旗
  interaction:
    interaction_radius: 5
    properties:
      description: 黑色铁门通向尼弗迦德驻军营地。岗哨士兵警惕地打量路人。 【可穿越 → garrison】
    gate:
      to_zone: garrison
      to_pos:
      - 19
      - 8
  description: 黑色铁门，通向尼弗迦德军营。
- id: garrison_bar_gate
  name: 营地大门
  zone: garrison
  pos:
  - 22
  - 12
  visual:
    visible_radius: 20
    properties:
      look: 从营地内侧看大门，外面能看到酒馆的灯光
  interaction:
    interaction_radius: 5
    properties:
      description: 推开铁门走出去。外面是狐狸与鹅酒馆，灯光明亮人声嘈杂。 【可穿越 → bar_zone】
    gate:
      to_zone: bar_zone
      to_pos:
      - 44
      - 11
  description: 营地的出口，通向酒馆。
- id: village_garrison_gate
  name: 军营侧门
  zone: village
  pos:
  - 26
  - 18
  visual:
    visible_radius: 20
    properties:
      look: 军营的侧门，平时少有士兵巡逻
  interaction:
    interaction_radius: 5
    properties:
      description: 军营的侧门。这里守卫松一些，但还是要小心尼弗迦德哨兵。 【可穿越 → garrison】
    gate:
      to_zone: garrison
      to_pos:
      - 19
      - 20
  description: 军营的侧门。通向尼弗迦德营地。
- id: garrison_village_gate
  name: 军营后门
  zone: garrison
  pos:
  - 16
  - 12
  visual:
    visible_radius: 20
    properties:
      look: 营地后门，外面是白果园村的农田
  interaction:
    interaction_radius: 5
    properties:
      description: 推开后门走出去。外面是白果园村的菜园和神殿，安静祥和。 【可穿越 → village】
    gate:
      to_zone: village
      to_pos:
      - 44
      - 14
  description: 营地的后门。推开后门就是白果园村。
- id: bar_counter
  name: 吧台
  zone: bar_zone
  pos:
  - 37
  - 12
  visual:
    visible_radius: 20
    sprite: counter_bar
    properties:
      look: 木制吧台，后面站着矮人老板
      detail: 酒架上有几瓶酒，吧台有些年头了
  interaction:
    interaction_radius: 3
    properties:
      description: 被无数酒杯磨得光滑发亮的橡木吧台。矮人老板在用脏布擦杯子。可以搭话聊天或倚靠休息。
    hidden:
      atmosphere: 喧闹温馨的乡村酒馆。老板粗鲁但热情，熟客多倒半杯。
      service: 心情好时透点消息，心情差时哼唧两句。
  description: 被无数酒杯磨得光滑发亮的橡木吧台。矮人老板站在吧台后。
- id: drink_ale
  name: 麦酒
  zone: bar_zone
  pos:
  - 40
  - 10
  visual:
    visible_radius: 3
    sprite: null
    properties:
      look: 一杯琥珀色麦酒，泡沫细密
      detail: 闻起来有麦芽香气
  interaction:
    interaction_radius: 2
    properties:
      description: 一杯琥珀色麦酒，泡沫细密。矮人老板刚从酒桶里打出来的，还冒着凉气。
    hidden:
      taste: 醇厚微苦，后味有蜂蜜甜。冰凉解渴。大概5个克朗。
      aroma: 浓郁麦芽香，带一点啤酒花苦味。
  description: 一杯琥珀色的麦酒，泡沫细密。
- id: drink_wine
  name: 葡萄酒
  zone: bar_zone
  pos:
  - 43
  - 11
  visual:
    visible_radius: 3
    sprite: null
    properties:
      look: 一杯深红色葡萄酒，果香浓郁
  interaction:
    interaction_radius: 2
    properties:
      description: 一杯深红色葡萄酒，果香浓郁。陶森特的上等货，价格不菲。
    hidden:
      taste: 黑莓和橡木的香气，丝滑醇厚。大概12个克朗。
      aroma: 果香芬芳，带陈年橡木桶气息。
  description: 一杯深红色的葡萄酒，果香浓郁。陶森特的上等货。
- id: table_01
  name: 散桌
  zone: bar_zone
  pos:
  - 20
  - 13
  visual:
    visible_radius: 15
    sprite: table
    properties:
      look: 靠窗的散桌，阳光正好洒在桌面
  interaction:
    interaction_radius: 2
    properties:
      description: 靠窗的一张散桌。阳光透过窗格洒在木桌上，桌面上还有上一杯酒的杯印。
    hidden:
      feel: 阳光暖洋洋的，是个安静歇脚的好位置。
  description: 靠窗的一张散桌。阳光透过窗格洒在木桌上。
- id: notice_board
  name: 公告板
  zone: bar_zone
  pos:
  - 23
  - 13
  visual:
    visible_radius: 10
    sprite: null
    properties:
      look: 一面钉满委托书的木制公告板
      detail: 上面贴满了猎魔委托：狮鹫兽、水鬼、日间妖灵...
  interaction:
    interaction_radius: 2
    properties:
      description: 一面钉满委托书的木制公告板。最上面是狮鹫兽委托，悬赏500金币，找维瑟米尔。
    hidden:
      content: 狮鹫兽出没白果园郊外，悬赏500金币。水鬼在沼泽区骚扰农户。日间妖灵出现在废弃灯塔。
  description: 一面钉满委托书的木制公告板。
- id: lute_stand
  name: 鲁特琴架
  zone: bar_zone
  pos:
  - 26
  - 15
  visual:
    visible_radius: 8
    sprite: null
    properties:
      look: 一个木制琴架，上面放着一把旧鲁特琴
  interaction:
    interaction_radius: 2
    properties:
      description: 一把旧的鲁特琴。弦有些旧了但调音还在。丹德里恩经常用它即兴表演。
    hidden:
      feel: 琴颈上有几道指甲痕，是丹德里恩弹太嗨时留下的。
      sound: 拨一下琴弦，声音有点闷但别有味道。
  description: 一个木制琴架，上面放着一把旧鲁特琴。
- id: backroom_door
  name: 后屋门
  zone: bar_zone
  pos:
  - 31
  - 13
  visual:
    visible_radius: 5
    sprite: null
    properties:
      look: 一扇挂着帘布的小门，通向酒馆后屋
  interaction:
    interaction_radius: 1
    properties:
      description: 酒馆的后屋门。帘布后面是存货间和老板的私人账房。外人勿入。
    hidden:
      secret: 老板在后屋藏了几箱走私的玛哈坎烈酒，还有一本记着谁欠账的破账本。
  description: 酒馆后屋门，挂着帘布。
- id: geralt
  name: 杰洛特
  zone: bar_zone
  pos:
  - 24
  - 17
  visual:
    visible_radius: 20
    sprite: char_witcher
    properties:
      look: 白发猎魔人，背后背着两把剑——银剑斩妖，钢剑杀人
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 150
      hunger: 50
      thirst: 60
      social: 20
      energy: 85
      fun: 15
      mood: 50
    properties:
      description: 可以压低声音聊两句。谈到怪物和报酬时话会多些。也可以拍拍肩膀打招呼。
  agent:
    autonomous: true
    speed: 1.2
    view_radius: 25
    hearing_radius: 20
    interaction_radius: 3
    personality: 利维亚的杰洛特，狼学派猎魔人。寡言少语，行事果断。刚刚完成一个水鬼委托，回到酒馆休整。习惯喝一杯麦酒，顺便看看公告板有没有新委托。
  description: 白发猎魔人，猫眼，脸上有疤。背着银剑和钢剑。
- id: dandelion
  name: 丹德里恩
  zone: bar_zone
  pos:
  - 27
  - 17
  visual:
    visible_radius: 20
    sprite: char_bard
    properties:
      look: 衣着花哨的吟游诗人，手里抱着鲁特琴，一脸轻松
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 80
      hunger: 45
      thirst: 75
      social: 90
      energy: 60
      fun: 85
      mood: 80
    properties:
      description: 可以和他聊天或听他弹唱。一开口就停不下来，从白果园女巫偷蜂蜜酒到尼弗迦德宫廷秘闻都能编进歌里。
  agent:
    autonomous: true
    speed: 0.9
    view_radius: 18
    hearing_radius: 15
    interaction_radius: 3
    personality: 丹德里恩，北境最有名的吟游诗人。喜欢喝酒聊天，顺便收集新歌素材。杰洛特的老朋友。今天想在酒馆即兴表演一首。
  description: 衣着花哨的吟游诗人，手里抱着鲁特琴。
- id: vesemir
  name: 维瑟米尔
  zone: bar_zone
  pos:
  - 30
  - 17
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 灰白胡子的老猎魔人，眼神锐利，腰间挂着几瓶剑油
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 200
      hunger: 40
      thirst: 50
      social: 30
      energy: 70
      fun: 40
      mood: 55
    properties:
      description: 可以压低声音聊两句。说话慢而沉稳，每句话都值得听。
  agent:
    autonomous: true
    speed: 1.0
    view_radius: 22
    hearing_radius: 18
    interaction_radius: 3
    personality: 维瑟米尔，狼学派最年长的猎魔人。凯尔莫罕的导师。稳重但偶尔露出老顽童的一面。
  description: 灰白胡子的老猎魔人，眼神锐利。
- id: zoltan
  name: 卓尔坦
  zone: bar_zone
  pos:
  - 33
  - 17
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 粗壮的矮人商人，胡子编成两根粗辫子，嗓门大得能震裂酒桶
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 500
      hunger: 45
      thirst: 65
      social: 60
      energy: 80
      fun: 55
      mood: 70
    properties:
      description: 和他聊天开口就是生意经——矿脉、商路、走私货。消息灵通，为人爽快。
  agent:
    autonomous: true
    speed: 0.8
    view_radius: 18
    hearing_radius: 15
    interaction_radius: 3
    personality: 卓尔坦·齐瓦，玛哈坎矮人商人。精明，消息灵通，嗓门大。喜欢请朋友喝酒，顺便打听商机。
  description: 粗壮的矮人商人，胡子编成辫子。手里永远有一杯麦酒。
- id: dijkstra
  name: 迪杰斯特拉
  zone: bar_zone
  pos:
  - 36
  - 17
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 一个光头大汉，跛足但气势压人，手里转着一枚金币
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 2000
      hunger: 30
      thirst: 20
      social: 10
      energy: 60
      fun: 10
      mood: 45
    properties:
      description: 可以压低声音和他聊两句。他说话滴水不漏，但如果你有他想要的情报，他会付个好价钱。
  agent:
    autonomous: true
    speed: 0.7
    view_radius: 22
    hearing_radius: 20
    interaction_radius: 3
    personality: 西吉斯蒙德·迪杰斯特拉，前瑞达尼亚间谍头子。跛足但头脑是北方最精密的机器。掌控诺维格勒地下情报网。来酒馆是为了等一个线人，但会在吧台角落观察所有人。
  description: 光头大汉，跛足。坐在角落，手里转着一枚金币。
- id: innkeeper
  name: 酒馆老板
  zone: bar_zone
  pos:
  - 24
  - 20
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 矮人老店主，胡子花白，用一块脏布擦着吧台
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 300
      hunger: 20
      thirst: 10
      social: 40
      energy: 60
      fun: 30
      mood: 60
    properties:
      description: 矮人老板。擦着杯子，嘴里嘟囔着什么。你可以点酒、打听消息、或者听他抱怨赊账的顾客。
  agent:
    autonomous: true
    speed: 0.6
    view_radius: 18
    hearing_radius: 15
    interaction_radius: 3
    personality: 老矮人酒馆老板。经营这间酒馆二十年了。认识每一个常客，知道他们欠了多少账。雇丹德里恩来表演吸引顾客。粗鲁但热心——对赊账三天以上的就翻脸。
  description: 矮人老店主，站在吧台后擦拭杯子。
- id: bard_apprentice
  name: 吟游学徒
  zone: bar_zone
  pos:
  - 27
  - 20
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 一个年轻人，怀里抱着一把走调的鲁特琴，满脸崇拜地看着丹德里恩
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 15
      hunger: 55
      thirst: 70
      social: 80
      energy: 90
      fun: 70
      mood: 85
    properties:
      description: 丹德里恩的学生。笨拙但热情。弹错和弦是日常，但记歌词的天赋惊人。
  agent:
    autonomous: true
    speed: 1.0
    view_radius: 16
    hearing_radius: 14
    interaction_radius: 3
    personality: 年轻的吟游学徒，丹德里恩的学生。热情过头但技艺欠佳。梦想写出传世名曲，但目前为止最好的一首歌词被老师偷去用了。崇拜丹德里恩但总搞砸——弹和弦弹成噪音、敬酒打翻酒杯、记录素材写错名字。
  description: 一个年轻人，怀里抱着走调的鲁特琴。
- id: square_well
  name: 水井
  zone: bar_zone
  pos:
  - 34
  - 13
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 一口石砌水井，井水清澈见底
  interaction:
    interaction_radius: 2
    properties:
      description: 广场中央的石砌水井。井绳和木桶挂在辘轳上。
    hidden:
      taste: 井水来自地下暗河，常年清凉甘甜。喝下去喉咙一阵冰凉。
      secret: 低头往井里看，深不见底。隐约能听到水滴声，自己的倒影在水面上微微晃动。
  description: 广场中央的石砌水井。井沿被无数只手磨得光滑。
- id: square_bench
  name: 长椅
  zone: bar_zone
  pos:
  - 37
  - 15
  visual:
    visible_radius: 15
    sprite: null
    properties:
      look: 树荫下的木制长椅，有老人在打盹
  interaction:
    interaction_radius: 2
    properties:
      description: 广场大树下的木制长椅。树荫遮住了太阳，有老人正在打盹。
    hidden:
      feel: 风吹过树叶沙沙响。是个发呆歇脚的好地方。
  description: 广场大树下的木制长椅。椅子上有老人正在打盹。
- id: square_merchant
  name: 商人摊位
  zone: bar_zone
  pos:
  - 40
  - 15
  visual:
    visible_radius: 15
    sprite: null
    properties:
      look: 一个摆满货物的临时摊位，商人正在吆喝
  interaction:
    interaction_radius: 3
    properties:
      description: 摆满面包、草药和杂货的临时摊位。矮人商贩正在大声吆喝。
    hidden:
      goods: 面包、草药、磨刀石、不知名瓶罐。讨价还价是矮人喜欢的调调，别砍太狠。
      service: 矮人商贩热情豪爽，成交时咧嘴笑。
  description: 一个摆满面包、草药和杂货的临时摊位。
