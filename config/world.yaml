world:
  name: 猎魔人世界 - 白果园
  time_scale: 60
  start_time: "08:00"

  simulation:
    currency: coins
    poll_interval: 0.3
    stale_timeout: 30
    memory_prompt_count: 5
    intent_ttl: 30
    default_patience: 5
    speech_window: 30
    kl:
      state_thresholds: [30, 60, 80]
      coin_epsilon: 5
    drive:
      min: 0
      max: 100
      urgent_threshold: 80
      needed_threshold: 60
    validation:
      delta_max: 30
      drive_min: 0
      drive_max: 100
    decay_rates:
      thirst: 0.022
      hunger: 0.018
      social: 0.015
      energy: -0.01
      fun: 0.015
    text:
      kl_entered: "{channel}: {name} 进入"
      kl_left: "{channel}: {name} 离开"
      kl_changed: "{channel}: {name} 变化"
      kl_stale: "太久没事做了"
      kl_coin: "coins {sign}{delta}"
      kl_state_cross: "{attr} {arrow}突破{t}"

zones:
- id: bar_zone
  name: 狐狸与鹅酒馆
  width: 24
  height: 16
- id: square
  name: 白果园广场
  width: 40
  height: 30
- id: herb_hut
  name: 托蜜拉的草药小屋
  width: 16
  height: 12
entities:
# ═══ GATES ═══
- id: bar_door
  name: 酒馆门口
  zone: bar_zone
  pos: [0, 4]
  visual:
    visible_radius: 20
    sprite: door
    properties:
      look: 酒馆的木质大门，通向白果园广场
  interaction:
    interaction_radius: 1
    properties:
      description: 狐狸与鹅酒馆的橡木大门。推开走出去就是白果园广场。
    gate: {to_zone: square, to_pos: [13, 5]}
  description: 酒馆的木质大门，通向白果园广场。

- id: square_bar_gate
  name: 酒馆入口
  zone: square
  pos: [13, 5]
  visual:
    visible_radius: 20
    sprite: door
    properties:
      look: 狐狸与鹅酒馆的招牌在风中摇晃，里面传来麦酒香
  interaction:
    interaction_radius: 1
    properties:
      description: 狐狸与鹅酒馆的橡木大门。门缝里透出麦酒香和暖黄灯光。
    gate: {to_zone: bar_zone, to_pos: [1, 4]}
  description: 狐狸与鹅酒馆的橡木大门。门缝里透出麦酒香和暖黄的灯光。

- id: square_herb_gate
  name: 草药小屋入口
  zone: square
  pos: [0, 6]
  visual:
    visible_radius: 20
    sprite: door
    properties:
      look: 一间歪斜的小木屋，门口挂满了干草药
  interaction:
    interaction_radius: 1
    properties:
      description: 一间歪斜的小木屋，门口挂满干草药。推门进去是托蜜拉的草药小屋。
    gate: {to_zone: herb_hut, to_pos: [7, 5]}
  description: 一间歪斜的小木屋，门口挂满了干草药。门缝里透出药草的混合气味。

- id: herb_door
  name: 小屋门口
  zone: herb_hut
  pos: [7, 5]
  visual:
    visible_radius: 20
    sprite: door
    properties:
      look: 透过门缝能看到白果园广场
  interaction:
    interaction_radius: 1
    properties:
      description: 草药小屋的木门。推门出去就是白果园广场。
    gate: {to_zone: square, to_pos: [1, 6]}
  description: 草药小屋的木门。透过门缝能看到白果园广场。

# ═══ BAR ZONE ═══
- id: bar_counter
  name: 吧台
  zone: bar_zone
  pos: [7, 2]
  visual:
    visible_radius: 20
    sprite: counter_bar
    properties:
      look: 木制吧台，后面站着矮人老板
      detail: 酒架上有几瓶酒，吧台有些年头了
  interaction:
    interaction_radius: 3
    properties:
      description: 被无数酒杯磨得光滑发亮的橡木吧台。矮人老板在用脏布擦杯子。可以搭话聊天或倚靠休息。
    hidden:
      atmosphere: "喧闹温馨的乡村酒馆。老板粗鲁但热情，熟客多倒半杯。"
      service: "心情好时透点消息，心情差时哼唧两句。"
  description: 被无数酒杯磨得光滑发亮的橡木吧台。矮人老板站在吧台后。墙上挂着一面公告板。

- id: drink_ale
  name: 麦酒
  zone: bar_zone
  pos: [7, 2]
  visual:
    visible_radius: 3
    sprite: null
    properties:
      look: 一杯琥珀色麦酒，泡沫细密
      detail: 闻起来有麦芽香气
  interaction:
    interaction_radius: 2
    properties:
      description: 一杯琥珀色麦酒，泡沫细密。矮人老板刚从酒桶里打出来的，还冒着凉气。
    hidden:
      taste: "醇厚微苦，后味有蜂蜜甜。冰凉解渴。大概5个克朗。"
      aroma: "浓郁麦芽香，带一点啤酒花苦味。"
  description: 一杯琥珀色的麦酒，泡沫细密。矮人老板刚从酒桶里打出来的。

- id: drink_wine
  name: 葡萄酒
  zone: bar_zone
  pos: [7, 2]
  visual:
    visible_radius: 3
    sprite: null
    properties:
      look: 一杯深红色葡萄酒，果香浓郁
  interaction:
    interaction_radius: 2
    properties:
      description: 一杯深红色葡萄酒，果香浓郁。陶森特的上等货，价格不菲。
    hidden:
      taste: "黑莓和橡木的香气，丝滑醇厚。大概12个克朗。"
      aroma: "果香芬芳，带陈年橡木桶气息。"
  description: 一杯深红色的葡萄酒，果香浓郁。陶森特的上等货。

- id: table_01
  name: 散桌
  zone: bar_zone
  pos: [3, 5]
  visual:
    visible_radius: 15
    sprite: table
    properties:
      look: 靠窗的散桌，阳光正好洒在桌面
  interaction:
    interaction_radius: 2
    properties:
      description: 靠窗的一张散桌。阳光透过窗格洒在木桌上，桌面上还有上一杯酒的杯印。
    hidden:
      feel: "阳光暖洋洋的，是个安静歇脚的好位置。"
  description: 靠窗的一张散桌。阳光透过窗格洒在木桌上。

- id: notice_board
  name: 公告板
  zone: bar_zone
  pos: [5, 7]
  visual:
    visible_radius: 10
    sprite: null
    properties:
      look: 一面钉满委托书的木制公告板
      detail: 上面贴满了猎魔委托：狮鹫兽、水鬼、日间妖灵...
  interaction:
    interaction_radius: 2
    properties:
      description: 一面钉满委托书的木制公告板。最上面是狮鹫兽委托，悬赏500金币，找维瑟米尔。
    hidden:
      content: "狮鹫兽出没白果园郊外，悬赏500金币。水鬼在沼泽区骚扰农户。日间妖灵出现在废弃灯塔。"
  description: 一面钉满委托书的木制公告板。

# ═══ SQUARE ═══
- id: square_well
  name: 水井
  zone: square
  pos: [7, 6]
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 一口石砌水井，井水清澈见底
  interaction:
    interaction_radius: 2
    properties:
      description: 广场中央的石砌水井。井绳和木桶挂在辘轳上。
    hidden:
      taste: "井水来自地下暗河，常年清凉甘甜。喝下去喉咙一阵冰凉。"
      secret: "低头往井里看，深不见底。隐约能听到水滴声，自己的倒影在水面上微微晃动。"
  description: 广场中央的石砌水井。井沿被无数只手磨得光滑。

- id: square_bench
  name: 长椅
  zone: square
  pos: [5, 7]
  visual:
    visible_radius: 15
    sprite: null
    properties:
      look: 树荫下的木制长椅，有老人在打盹
  interaction:
    interaction_radius: 2
    properties:
      description: 广场大树下的木制长椅。树荫遮住了太阳，有老人正在打盹。
    hidden:
      feel: "风吹过树叶沙沙响。是个发呆歇脚的好地方。"
  description: 广场大树下的木制长椅。椅子上有老人正在打盹。

- id: square_merchant
  name: 商人摊位
  zone: square
  pos: [10, 3]
  visual:
    visible_radius: 15
    sprite: null
    properties:
      look: 一个摆满货物的临时摊位，商人正在吆喝
  interaction:
    interaction_radius: 3
    properties:
      description: 摆满面包、草药和杂货的临时摊位。矮人商贩正在大声吆喝。
    hidden:
      goods: "面包、草药、磨刀石、不知名瓶罐。讨价还价是矮人喜欢的调调，别砍太狠。"
      service: "矮人商贩热情豪爽，成交时咧嘴笑。"
  description: 一个摆满面包、草药和杂货的临时摊位。

- id: coin_ground
  name: 硬币
  zone: square
  pos: [4, 10]
  visual:
    visible_radius: 1
    sprite: null
    properties:
      look: 地上有一枚亮闪闪的硬币
  interaction:
    interaction_radius: 1
    properties:
      description: 一枚亮闪闪的泰莫利亚金币，不知道是谁掉的。
    hidden:
      detail: "上面有泰莫利亚的纹章。看起来刚掉不久。"
  description: 地上躺着一枚亮闪闪的硬币。

# ═══ HERB HUT ═══
- id: herb_shelf
  name: 草药架
  zone: herb_hut
  pos: [3, 2]
  visual:
    visible_radius: 10
    sprite: null
    properties:
      look: 一个摆满瓶瓶罐罐的草药架，散发着各种草药混合的气味
      detail: 曼德拉草根、狼毒乌头、白屈花...每样都标注了功效
  interaction:
    interaction_radius: 2
    properties:
      description: 摆满瓶瓶罐罐的草药架。曼德拉草根——重伤。狼毒乌头——剧毒需稀释。白屈花——魔药基底。
    hidden:
      herbs: "曼德拉草根还能微微颤动，能做出最强治疗药水。白屈花花瓣散发淡淡荧光。"
      labels: "每个瓶罐都贴着褪色标签，托蜜拉亲手写的功效和年份。"
  description: 一个摆满瓶瓶罐罐的草药架。每样都贴着褪色标签。

- id: herb_mortar
  name: 研钵
  zone: herb_hut
  pos: [3, 3]
  visual:
    visible_radius: 8
    sprite: null
    properties:
      look: 一个石制研钵，里面还残留着一些绿色粉末
  interaction:
    interaction_radius: 2
    properties:
      description: 石制研钵，里面残留着绿色粉末。研杵还沾着上批草药的痕迹。
    hidden:
      feel: "石钵冰凉，粉末在指尖闪着微弱的荧光。研磨需要耐心和手腕力气。"
  description: 一个石制研钵，里面残留着某种绿色粉末。

- id: herb_recipe_book
  name: 配方书
  zone: herb_hut
  pos: [4, 2]
  visual:
    visible_radius: 6
    sprite: null
    properties:
      look: 一本厚重的皮制笔记本，书页边缘已经泛黄
  interaction:
    interaction_radius: 1
    properties:
      description: 厚重的皮制笔记本，书页泛黄。里面密密麻麻写满魔药配方和批注。
    hidden:
      content: "燕子——加速愈合。猫——夜视。暴雪——强化反应。每页都有托蜜拉的手写批注：草药的年份、用量调整、实验结果。"
  description: 一本厚重的皮制笔记本。书页泛黄，写满魔药配方。

- id: herb_cauldron
  name: 炼金坩埚
  zone: herb_hut
  pos: [5, 3]
  visual:
    visible_radius: 10
    sprite: null
    properties:
      look: 一口冒着热气的小坩埚，里面煮着某种墨绿色的液体
  interaction:
    interaction_radius: 2
    properties:
      description: 黑色小坩埚，煮着墨绿色液体。热气蒸腾，空气中弥漫草药苦味。
    hidden:
      content: "墨绿色液体咕嘟冒泡，闻起来像猫眼药水——还差最后一步。投入材料后颜色开始变化——可能成功，也可能炸锅。"
      secret: "坩埚底下压着一张揉皱的字条。"
  description: 一口黑色小坩埚，煮着墨绿色液体。底下压着字条。

- id: herb_basket
  name: 原料篮
  zone: herb_hut
  pos: [6, 2]
  visual:
    visible_radius: 6
    sprite: null
    properties:
      look: 一个柳条编的大篮子，里面堆满了刚采回来的草药
  interaction:
    interaction_radius: 2
    properties:
      description: 柳条编的大篮子，堆满刚采的草药。散发泥土和植物的混合气味。
    hidden:
      content: "里面有蒲公英、鼠尾草、白色骨粉——不知道什么生物。还有一束散发荧光的沼泽苔藓。"
  description: 一个柳条编的大篮子，堆满新鲜草药。

- id: herb_potion_finished
  name: 成品魔药
  zone: herb_hut
  pos: [5, 2]
  visual:
    visible_radius: 4
    sprite: null
    properties:
      look: 一排已经完成的魔药瓶，标签上写着燕子、猫、暴雪
  interaction:
    interaction_radius: 2
    properties:
      description: 一排已经完成的魔药瓶。标签上写着燕子、猫、暴雪。托蜜拉亲手调制。
    hidden:
      quality: "燕子魔药暗红色液体摇晃时冒出细小气泡——品质不错。但副作用永远是个未知数。"
  description: 一排已经完成的魔药瓶。每瓶都是托蜜拉亲手调制。

- id: herb_note
  name: 字条
  zone: herb_hut
  pos: [5, 1]
  visual:
    visible_radius: 3
    sprite: null
    properties:
      look: 一张压在坩埚下的字条，字迹潦草
  interaction:
    interaction_radius: 1
    properties:
      description: 压在坩埚下的小字条。字迹潦草但有力。
    hidden:
      message: "叶奈法大人——您要的星辉石粉末我放在后屋了。白果园郊外最近出现狮鹫兽，杰洛特大人可能会感兴趣。——托蜜拉"
  description: 一张压在坩埚下的小字条。看起来是匆忙写下的留言。

# ═══ AGENTS ═══
- id: geralt
  name: 杰洛特
  zone: square
  pos: [7, 5]
  visual:
    visible_radius: 20
    sprite: char_witcher
    properties:
      look: 白发猎魔人，背后背着两把剑——银剑斩妖，钢剑杀人
  interaction:
    interaction_radius: 3
    private_attrs: {coins: 150, hunger: 50, thirst: 60, social: 20, energy: 85, fun: 15, mood: 50}
    properties:
      description: 可以压低声音聊两句。谈到怪物和报酬时话会多些。也可以拍拍肩膀打招呼——他会抬头看你一眼。
  agent:
    autonomous: true
    speed: 1.2
    view_radius: 25
    hearing_radius: 20
    interaction_radius: 3
    personality: 利维亚的杰洛特，狼学派猎魔人。寡言少语，行事果断。刚刚完成一个水鬼委托，回到白果园休整。习惯在酒馆喝一杯，顺便看看公告板有没有新委托。
  description: 白发猎魔人，猫眼，脸上有疤。背着银剑和钢剑。

- id: yennefer
  name: 叶奈法
  zone: herb_hut
  pos: [4, 2]
  visual:
    visible_radius: 20
    sprite: char_sorceress
    properties:
      look: 黑发紫眼的女术士，周身环绕着淡淡的魔法气息
  interaction:
    interaction_radius: 3
    private_attrs: {coins: 500, hunger: 30, thirst: 40, social: 10, energy: 70, fun: 40, mood: 55}
    properties:
      description: 可以和她交谈或请教魔法。说话带着术士的优雅和距离感。提到魔法材料或杰洛特时眼神会亮起来。
  agent:
    autonomous: true
    speed: 1.0
    view_radius: 22
    hearing_radius: 18
    interaction_radius: 3
    personality: 温格堡的叶奈法，强大的女术士。正在寻找稀有的魔法材料，被草药小屋的收藏吸引而来。高傲但关心杰洛特。
  description: 黑发紫眼的女术士，长袍上散发着紫丁香与醋栗的香气。

- id: dandelion
  name: 丹德里恩
  zone: bar_zone
  pos: [2, 6]
  visual:
    visible_radius: 20
    sprite: char_bard
    properties:
      look: 衣着花哨的吟游诗人，手里抱着鲁特琴，一脸轻松
  interaction:
    interaction_radius: 3
    private_attrs: {coins: 80, hunger: 45, thirst: 75, social: 90, energy: 60, fun: 85, mood: 80}
    properties:
      description: 可以和他聊天或听他弹唱。一开口就停不下来，从白果园女巫偷蜂蜜酒到尼弗迦德宫廷秘闻都能编进歌里。
  agent:
    autonomous: true
    speed: 0.9
    view_radius: 18
    hearing_radius: 15
    interaction_radius: 3
    personality: 丹德里恩，北境最有名的吟游诗人。喜欢喝酒聊天，顺便收集新歌素材。杰洛特的老朋友。今天想在酒馆即兴表演一首。
  description: 衣着花哨的吟游诗人，手里抱着鲁特琴。

- id: vesemir
  name: 维瑟米尔
  zone: bar_zone
  pos: [7, 2]
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 灰白胡子的老猎魔人，眼神锐利，腰间挂着几瓶剑油
  interaction:
    interaction_radius: 3
    private_attrs: {coins: 200, hunger: 40, thirst: 50, social: 30, energy: 70, fun: 40, mood: 55}
    properties:
      description: 可以压低声音聊两句。说话慢而沉稳，每句话都值得听。
  agent:
    autonomous: true
    speed: 1.0
    view_radius: 22
    hearing_radius: 18
    interaction_radius: 3
    personality: 维瑟米尔，狼学派最年长的猎魔人。凯尔莫罕的导师。稳重但偶尔露出老顽童的一面。
  description: 灰白胡子的老猎魔人，眼神锐利。面前放着一杯麦酒。

- id: triss
  name: 特莉丝
  zone: square
  pos: [35, 15]
  visual:
    visible_radius: 20
    sprite: char_sorceress
    properties:
      look: 栗色卷发的女术士，灰蓝色的眼睛带着精灵血统的狡黠
  interaction:
    interaction_radius: 3
