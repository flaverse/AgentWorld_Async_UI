world:
  name: 老友记 — Central Perk
  time_scale: 60
  start_time: "10:00"
  simulation:
    currency: coins
    poll_interval: 0.3
    stale_timeout: 30
    memory_prompt_count: 5
    default_patience: 5
    kl:
      state_thresholds:
      - 30
      - 60
      - 80
      coin_epsilon: 5
    drive:
      attributes:
        thirst:
          min: 0
          max: 100
          decay: 0.02
          description: 想喝咖啡的欲望。100=不喝咖啡无法正常社交。0=咖啡因完全够。
        hunger:
          min: 0
          max: 100
          decay: 0.018
          description: 饥饿。100=饿到抢Joey的披萨。0=完全不饿。（Joey从不分享食物）
        social:
          min: 0
          max: 100
          decay: 0.025
          description: 社交需求。在Central Perk找人聊八卦是生存本能。100=必须找人吐槽。
        energy:
          min: 0
          max: 100
          decay: -0.008
          description: 精力。0=在沙发上睡着了谁也叫不醒。100=能连赶三场约会。
        fun:
          min: 0
          max: 100
          decay: 0.02
          description: 娱乐需求。100=必须玩点什么否则要发疯。0=被Joey的演技已经笑够了。
        mood:
          min: 0
          max: 100
          decay: 0.0
          description: 心情。0=分手模式——躺在沙发上吃一整天冰淇淋。100=WE WERE ON A BREAK!
    validation:
      delta_max: 30
    text:
      kl_entered: '{channel}: {name} 路过'
      kl_left: '{channel}: {name} 走开了'
      kl_changed: '{channel}: {name} 变了'
      kl_stale: 有人靠在沙发上睡着了
      kl_coin: 小费 {sign}{delta} 美元
      kl_state_cross: '{attr} {arrow}突破{t}'
zones:
- id: central_perk
  name: Central Perk 咖啡厅
  width: 40
  height: 30
- id: monicas_apt
  name: Monica 的公寓
  width: 30
  height: 25
- id: street
  name: 格林威治村街道
  width: 40
  height: 30
entities:
# ── Gates ──
- id: apartment_door_a
  name: 公寓大门
  zone: central_perk
  pos:
  - 22
  - 18
  visual:
    visible_radius: 15
    properties:
      look: 一扇紫色大门，挂着黄色相框
  interaction:
    interaction_radius: 3
    properties:
      description: 上楼就是Monica的公寓。敲敲门——如果不介意Chandler的冷笑话。 【可穿越 → monicas_apt】
    gate:
      to_zone: monicas_apt
      to_pos:
      - 14
      - 12
  description: 紫色大门，挂着黄色相框。通向Monica的公寓。
- id: apartment_door_b
  name: 公寓大门
  zone: monicas_apt
  pos:
  - 14
  - 12
  visual:
    visible_radius: 10
    properties:
      look: 从内侧看大门——墙角鞋柜上摆着Monica的清洁用品
  interaction:
    interaction_radius: 2
    properties:
      description: 打开门就是Central Perk的喧嚣。下楼喝咖啡？ 【可穿越 → central_perk】
    gate:
      to_zone: central_perk
      to_pos:
      - 22
      - 18
  description: Monica公寓的大门。楼道灯永远在闪。
- id: street_door_a
  name: 下楼
  zone: monicas_apt
  pos:
  - 8
  - 18
  visual:
    visible_radius: 8
    properties:
      look: 楼梯通向街道
  interaction:
    interaction_radius: 2
    properties:
      description: 推开楼下大门就是格林威治村的街道。街灯亮着，热狗摊冒着热气。 【可穿越 → street】
    gate:
      to_zone: street
      to_pos:
      - 18
      - 16
  description: 楼梯通向街道。楼下就是格林威治村。
- id: street_door_b
  name: 公寓楼门
  zone: street
  pos:
  - 18
  - 16
  visual:
    visible_radius: 15
    properties:
      look: 格林威治村一栋老式公寓楼的入口
  interaction:
    interaction_radius: 3
    properties:
      description: Monica和Chandler的公寓楼。按对讲机叫人——如果有人在的话。 【可穿越 → monicas_apt】
    gate:
      to_zone: monicas_apt
      to_pos:
      - 8
      - 18
  description: 老式公寓楼入口。格林威治村典型建筑。

# ── Items: Central Perk ──
- id: orange_couch
  name: 橘色沙发
  zone: central_perk
  pos:
  - 20
  - 14
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 橘色天鹅绒大沙发，中央就这张
  interaction:
    interaction_radius: 2
    properties:
      description: 橘色天鹅绒大沙发。Gunther说没人能霸占——但这六个人已经霸了十年。
    hidden:
      lore: 六个朋友永远坐这里。换座位等于叛变。
      feel: 坐上去就陷进去，整个人被橘色吞没。不想起来。
  description: 橘色大沙发。Central Perk的圣地。

- id: coffee_counter
  name: 咖啡吧台
  zone: central_perk
  pos:
  - 15
  - 8
  visual:
    visible_radius: 15
    sprite: null
    properties:
      look: 木制吧台，Gunther永远在擦蒸汽嘴
  interaction:
    interaction_radius: 2
    properties:
      description: Central Perk的咖啡吧台。Gunther站了十年——因为他永远在看Rachel。
    hidden:
      menu: 拿铁$3.50，卡布奇诺$3.75，不加奶$2.50。但Gunther有时会送一块小饼干——只是给Rachel。
  description: 木制吧台。Gunther在这里擦杯子，顺便偷看Rachel。

- id: espresso_machine
  name: 意式咖啡机
  zone: central_perk
  pos:
  - 15
  - 12
  visual:
    visible_radius: 8
    sprite: null
    properties:
      look: 老旧意式咖啡机，打奶泡时会发出濒死大象的叫声
  interaction:
    interaction_radius: 2
    properties:
      description: 一台脾气不好的老咖啡机。Rachel第一天使用它时把牛奶喷到了自己脸上。
    hidden:
      quirk: 蒸汽嘴有点堵，要用特殊的角度拧一下才出泡。只有Gunther知道秘诀。
      sound: 嘶——噗——噗嗤——GUNTHER!（那是机器的声音，不是在叫Gunther）
  description: 老旧咖啡机。打奶泡声音像濒死大象。

- id: guitar_stool
  name: 高脚凳
  zone: central_perk
  pos:
  - 25
  - 12
  visual:
    visible_radius: 10
    sprite: null
    properties:
      look: 一张木制高脚凳，Phoebe弹Smelly Cat的固定位
  interaction:
    interaction_radius: 2
    properties:
      description: Phoebe的专属位置。凳面上有一道吉他擦痕——十年了。偶尔有客人想坐，Gunther会过来警告。
    hidden:
      songs: Smelly Cat、Smelly Cat 加长版、Smelly Cat 圣诞节版。还有几首关于她妈妈转世成了猫的歌。
  description: 木制高脚凳。Phoebe的专属宝座。

# ── Items: Monica Apartment ──
- id: monicas_kitchen
  name: 厨房
  zone: monicas_apt
  pos:
  - 18
  - 8
  visual:
    visible_radius: 12
    sprite: null
    properties:
      look: 一尘不染的超大厨房——连冰箱里的鸡蛋都按日期排好
  interaction:
    interaction_radius: 2
    properties:
      description: Monica的厨房。11级洁净度——她每天晚上会用牙刷擦每一条缝隙。Joey偷吃从来逃不过她的眼睛。
    hidden:
      organization: 调料按字母顺序排。锅按直径排。抹布按颜色排。冰箱里有11个贴上标签的保鲜盒。
      rules: 用完必须放回原位，否则Monica会控制不住自己（她的原话是'没事的放松点'——然后凌晨四点爬起来重新整理）。
  description: 一尘不染的厨房。鸡蛋都按日期排好。

- id: foosball_table
  name: 桌游足球
  zone: monicas_apt
  pos:
  - 8
  - 10
  visual:
    visible_radius: 10
    sprite: null
    properties:
      look: 一张木质足球桌游台，球员头都被拧歪了
  interaction:
    interaction_radius: 2
    properties:
      description: 足球桌游台。Monica和Chandler的主场。她从不让他赢——即使他是她老公。
    hidden:
      rivalry: Monica赢球记录——Chandler至今不敢追问具体数字。他说'我选择不记比分'。
      joey: Joey试图把披萨放在桌游台上被Monica终身禁赛。
  description: 足球桌游台。Monica和Chandler的战场。

- id: recliner_chairs
  name: 皮躺椅
  zone: monicas_apt
  pos:
  - 8
  - 16
  visual:
    visible_radius: 12
    sprite: null
    properties:
      look: Joey和Chandler的两张棕色皮躺椅，能放平
  interaction:
    interaction_radius: 2
    properties:
      description: Joey和Chandler的皮躺椅。遥控器永远在Joey那边。Chandler想拿的话必须过Joey的第一道防线——'我在看着呢'。
    hidden:
      joey_declaration: Joey曾对Rachel宣言——'这两张椅子绝不能换。它们是家。是家啊！'
      smell: 轻微披萨味和啤酒味——这是这些椅子该有的味道。
  description: 两张棕色皮躺椅。Joey和Chandler的领地。

- id: tv_set
  name: 电视
  zone: monicas_apt
  pos:
  - 6
  - 18
  visual:
    visible_radius: 8
    sprite: null
    properties:
      look: 老式电视，天线缠了铝箔
  interaction:
    interaction_radius: 2
    properties:
      description: 老式电视。Baywatch和Discovery Channel永远是争夺对象。有时天线得用手扶着才能出画面。
    hidden:
      schedule: Joey的Baywatch时间是不容侵犯的。Ross的Discovery Channel纪录片只有没人时能看。
      fix: 拍一拍侧面有时能修好。Chandler说是他的独门技术支持——拍的角度要对。
  description: 老式电视。天线缠了铝箔。

# ── Items: Street ──
