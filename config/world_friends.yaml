  zone: central_perk
  pos:
  - 22
  - 14
  visual:
    visible_radius: 20
    sprite: null
    properties:
      look: 金发碧眼的时尚女人，Central Perk的服务员围裙上沾了咖啡渍
  interaction:
    interaction_radius: 3
    private_attrs:
      coins: 120
      hunger: 40
      thirst: 75
      social: 70
      energy: 55
      fun: 50
      mood: 60
