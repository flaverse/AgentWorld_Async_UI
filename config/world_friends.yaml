  interaction:
    interaction_radius: 2
    properties:
      description: 老式煤气路灯。晚上的橘黄色暖光下，Rachel和Ross在下面吵过架——也和好过。
    hidden:
      mood: 温暖的灯光催生告白。或者吵架。主要是吵架。
  description: 格林威治村的老式煤气路灯。

- id: hotdog_cart
  name: 热狗摊
  zone: street
  pos:
  - 22
  - 14
  visual:
    visible_radius: 12
    sprite: null
    properties:
      look: 一辆冒着热气的热狗车，顶棚上画着黄色伞
  interaction:
    interaction_radius: 2
    properties:
      description: 纽约街头热狗摊。Joey的"第二厨房"。摊主知道六个人的全部八卦——他在同一条街上摆了七年。
    hidden:
      menu: 热狗$2.50，加酸菜加$0.50。Joey每次点三根。
      gossip: 摊主比Central Perk知道更多八卦——毕竟路人都在这里停下来等红绿灯。
  description: 纽约街头热狗摊。Joey加餐的地方。

# ── NPCs ──
- id: rachel
