<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentWorld — 猎魔人世界</title>
    <link rel="stylesheet" href="/web/css/pixel.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="game-container"></div>
        <div id="panel">
            <div class="panel-section">
                <div id="status">● 加载中...</div>
                <div id="hud-time">--:--</div>
                <div id="hud-zone">📍 加载中</div>
                <div id="hud-count"></div>
            </div>
            <div class="panel-section">
                <h3>👤 Agents</h3>
                <div id="agent-list"></div>
            </div>
            <div class="panel-section" style="flex:1; min-height:0; display:flex; flex-direction:column;">
                <h3>📋 Events</h3>
                <div id="event-log"></div>
            </div>
            <div id="controls">
                <button class="btn btn-start" id="btn-start" onclick="toggleWS()">▶ CONNECT</button>
                <button class="btn btn-stop"  id="btn-stop"  onclick="stopWS()">■ STOP</button>
            </div>
        </div>
    </div>
    <script src="/web/js/main.js"></script>
</body>
</html>
