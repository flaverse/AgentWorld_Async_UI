<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentWorld Live</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
  --cyan: #39d2c0; --gold: #d29922;
  --green: #22c55e; --yellow: #eab308; --orange: #f97316; --red: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font: 13px/1.4 'DejaVu Sans', sans-serif; }
.header { padding: 12px 20px 8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 17px; }
.status-bar { padding: 4px 20px; font-size: 11px; background: #1a1000; color: var(--yellow); border-bottom: 1px solid var(--border); display: flex; gap: 16px; }
.status-bar.ok { background: #0a1a0a; color: var(--green); }
.status-bar .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.status-bar .dot.off { background: var(--red); }
.status-bar .dot.on { background: var(--green); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 10px; padding: 10px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.3s; }
.card.flash { border-color: var(--accent); }
.card-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px 4px; border-bottom: 1px solid var(--border); }
.card-head .name { font-size: 14px; font-weight: 700; }
.card-head .zone { font-size: 10px; color: var(--dim); }
.card-head .ts { font-size: 10px; color: var(--dim); font-variant-numeric: tabular-nums; }
.channel { padding: 6px 12px; border-bottom: 1px solid rgba(48,54,61,0.4); }
.channel .label { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
.ch-action .label { color: var(--accent); }
.ch-dialogue .label { color: var(--cyan); }
.ch-dialogue .body { color: var(--cyan); font-style: italic; word-break: break-word; }
.ch-drives .label { color: var(--gold); }
.ch-action .body, .ch-dialogue .body { transition: opacity 0.3s; min-height: 16px; }
.body.flash-in { animation: flashIn 0.5s ease-out; }
@keyframes flashIn { from { opacity: 0.3; color: var(--accent); } to { opacity: 1; } }

.drive-row { display: flex; align-items: center; gap: 5px; margin: 1px 0; font-size: 10px; }
.drive-name { width: 44px; text-align: right; color: var(--dim); flex-shrink: 0; }
.drive-bar-outer { width: 130px; height: 8px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.drive-bar-inner { height: 100%; border-radius: 2px; transition: width 0.4s ease; min-width: 2px; }
.drive-val { width: 24px; text-align: right; color: var(--dim); flex-shrink: 0; }
.coins-row { display: flex; gap: 5px; font-size: 10px; color: var(--dim); margin-top: 2px; }

.input-toggle { padding: 6px 12px; cursor: pointer; font-size: 10px; color: var(--dim); border-bottom: 1px solid var(--border); user-select: none; }
.input-toggle:hover { color: var(--text); }
.input-toggle .arrow { display: inline-block; transition: transform 0.2s; margin-right: 4px; }
.input-toggle.open .arrow { transform: rotate(90deg); }
.input-body { display: none; }
.input-body.open { display: block; }
.sensory-block { padding: 4px 12px 4px 20px; font-size: 10px; }
.sensory-block .sensory-label { color: var(--dim); font-size: 9px; margin-bottom: 2px; }
.sensory-item { color: var(--dim); padding: 1px 0; }
.sensory-item .s-name { color: var(--text); }
</style>
</head>
<body>
<div class="header">
  <h1>AgentWorld Live</h1>
  <div style="display:flex;gap:16px;font-size:12px;color:var(--dim)">
    <span id="agents-count">0 agents</span>
    <span id="events-count">0 events</span>
    <span id="clock">⏱ 00:00</span>
  </div>
</div>
<div class="status-bar" id="status-bar"><span class="dot off"></span> Connecting...</div>
<div class="grid" id="grid"></div>

<script>
const PORT = location.port || '8766';
const cards = {};
let totalEvents = 0;

function driveColor(v) {
  if (v <= 30) return 'var(--green)';
  if (v <= 60) return 'var(--yellow)';
  if (v <= 80) return 'var(--orange)';
  return 'var(--red)';
}

function ensureCard(agent, zone) {
  if (cards[agent]) return cards[agent];
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `<div class="card-head">
      <span class="name">${agent}</span>
      <span class="zone">${zone}</span>
      <span class="ts">⏱ --</span>
    </div>
    <div class="channel ch-action"><div class="label">action</div><div class="body">--</div></div>
    <div class="channel ch-dialogue"><div class="label">dialogue</div><div class="body">--</div></div>
    <div class="channel ch-drives">
      <div class="label">drives</div>
      <div class="drives-container"><span style="color:var(--dim);font-size:10px">--</span></div>
    </div>
    <div class="input-toggle" onclick="toggleInput(this)">
      <span class="arrow">▶</span> sensory · <span class="sensory-summary">--</span>
    </div>
    <div class="input-body">
      <div class="sensory-block visual-block"><div class="sensory-label">visual</div></div>
      <div class="sensory-block auditory-block"><div class="sensory-label">auditory</div></div>
    </div>`;
  document.getElementById('grid').appendChild(el);
  cards[agent] = el;
  document.getElementById('agents-count').textContent = Object.keys(cards).length + ' agents';
  return el;
}

function updateDrives(el, drives) {
  const container = el.querySelector('.drives-container');
  const names = ['hunger','thirst','social','energy','fun','mood'];
  let html = '';
  for (const k of names) {
    const v = drives[k] != null ? Math.round(drives[k]) : 0;
    html += `<div class="drive-row"><span class="drive-name">${k}</span>
      <div class="drive-bar-outer"><div class="drive-bar-inner" style="width:${Math.max(v,2)}%;background:${driveColor(v)}"></div></div>
      <span class="drive-val">${v}</span></div>`;
  }
  if (drives['coins'] != null) html += `<div class="coins-row">coins: ${drives['coins']}</div>`;
  container.innerHTML = html;
}

function updateSensory(el, visual, auditory) {
  const vBlock = el.querySelector('.visual-block');
  let vhtml = '<div class="sensory-label">visual</div>';
  if (visual && visual.length) {
    for (const e of visual) vhtml += `<div class="sensory-item"><span class="s-name">${e.name}</span> (${e.distance}格) — ${e.look||''}</div>`;
  } else vhtml += '<div class="sensory-item" style="color:var(--dim)">--</div>';
  vBlock.innerHTML = vhtml;
  const aBlock = el.querySelector('.auditory-block');
  let ahtml = '<div class="sensory-label">auditory</div>';
  if (auditory && auditory.length) {
    for (const e of auditory) ahtml += `<div class="sensory-item"><span class="s-name">${e.name}</span>: "${e.speech||''}"</div>`;
  } else ahtml += '<div class="sensory-item" style="color:var(--dim)">--</div>';
  aBlock.innerHTML = ahtml;
  const s = el.querySelector('.sensory-summary');
  s.textContent = 'v:' + (visual?visual.length:0) + ' a:' + (auditory?auditory.length:0);
}

function toggleInput(t) { t.classList.toggle('open'); t.nextElementSibling.classList.toggle('open'); }

function setStatus(text, ok) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = '<span class="dot ' + (ok?'on':'off') + '"></span> ' + text;
  bar.className = 'status-bar' + (ok ? ' ok' : '');
}

function handleEvent(evt) {
  totalEvents++;
  document.getElementById('events-count').textContent = totalEvents + ' events';
  const card = ensureCard(evt.agent, evt.zone || '?');
  if (evt.ts != null) {
    card.querySelector('.ts').textContent = evt.ts.toFixed(1) + 's';
    const m = Math.floor(evt.ts/60), s = Math.floor(evt.ts%60);
    document.getElementById('clock').textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  card.classList.add('flash');
  setTimeout(() => card.classList.remove('flash'), 500);
  if (evt.action_text) {
    const el = card.querySelector('.ch-action .body');
    el.textContent = evt.action_text;
    el.classList.remove('flash-in'); void el.offsetWidth; el.classList.add('flash-in');
  }
  if (evt.dialogue !== undefined) {
    const el = card.querySelector('.ch-dialogue .body');
    el.textContent = evt.dialogue ? '"' + evt.dialogue + '"' : '--';
    el.classList.remove('flash-in'); void el.offsetWidth; el.classList.add('flash-in');
  }
  if (evt.drives) updateDrives(card, evt.drives);
  if (evt.visual || evt.auditory) updateSensory(card, evt.visual, evt.auditory);
}

function connect() {
  setStatus('Connecting...', false);
  const ws = new WebSocket('ws://' + location.hostname + ':' + PORT + '/ws');
  ws.onopen = () => setStatus('Connected · ' + Object.keys(cards).length + ' agents · ' + totalEvents + ' events', true);
  ws.onmessage = (msg) => {
    try {
      const evt = JSON.parse(msg.data);
      if (evt.agent === '_meta') return;
      handleEvent(evt);
      setStatus('Live · ' + Object.keys(cards).length + ' agents · ' + totalEvents + ' events', true);
    } catch(e) { console.error(e); }
  };
  ws.onerror = () => setStatus('Connection error — retrying...', false);
  ws.onclose = () => { setStatus('Disconnected — retrying...', false); setTimeout(connect, 2000); };
}
connect();
</script>
</body>
</html>
