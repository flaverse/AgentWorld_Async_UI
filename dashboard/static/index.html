<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentWorld Live</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
  --cyan: #39d2c0; --gold: #d29922; --purple: #a371f7;
  --green: #22c55e; --yellow: #eab308; --orange: #f97316; --red: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font: 13px/1.4 'DejaVu Sans', sans-serif; }
.header { padding: 10px 20px 8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 17px; }
.header .controls { display: flex; gap: 8px; align-items: center; }
.btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); color: var(--text); cursor: pointer; font-size: 11px; font-family: inherit; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.warn { border-color: var(--orange); color: var(--orange); }
.status-bar { padding: 4px 20px; font-size: 10px; background: #1a1000; color: var(--yellow); border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: center; }
.status-bar.ok { background: #0a1a0a; color: var(--green); }
.status-bar .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.status-bar .dot.off { background: var(--red); }
.status-bar .dot.on { background: var(--green); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; padding: 10px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.3s; }
.card.flash { border-color: var(--accent); }
.card.controlled { border-color: var(--gold); }
.card-head { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px 4px; border-bottom: 1px solid var(--border); }
.card-head .name { font-size: 14px; font-weight: 700; }
.card-head .zone { font-size: 10px; color: var(--dim); }
.card-head .ts { font-size: 10px; color: var(--dim); font-variant-numeric: tabular-nums; }
.channel { padding: 6px 12px; border-bottom: 1px solid rgba(48,54,61,0.4); }
.channel .label { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
.ch-action .label { color: var(--accent); }
.ch-dialogue .label { color: var(--cyan); }
.ch-dialogue .body { color: var(--cyan); font-style: italic; word-break: break-word; }
.ch-drives .label { color: var(--gold); }
.ch-action .body, .ch-dialogue .body { transition: opacity 0.3s; min-height: 16px; }
.body.flash-in { animation: flashIn 0.5s ease-out; }
@keyframes flashIn { from { opacity: 0.3; color: var(--accent); } to { opacity: 1; } }
.drive-row { display: flex; align-items: center; gap: 5px; margin: 1px 0; font-size: 10px; }
.drive-name { width: 44px; text-align: right; color: var(--dim); flex-shrink: 0; }
.drive-bar-outer { width: 120px; height: 8px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.drive-bar-inner { height: 100%; border-radius: 2px; transition: width 0.4s ease; min-width: 2px; }
.drive-val { width: 24px; text-align: right; color: var(--dim); flex-shrink: 0; }
.coins-row { display: flex; gap: 5px; font-size: 10px; color: var(--dim); margin-top: 2px; }
.input-toggle { padding: 6px 12px; cursor: pointer; font-size: 10px; color: var(--dim); border-bottom: 1px solid var(--border); user-select: none; }
.input-toggle:hover { color: var(--text); }
.input-toggle .arrow { display: inline-block; transition: transform 0.2s; margin-right: 4px; }
.input-toggle.open .arrow { transform: rotate(90deg); }
.input-body { display: none; }
.input-body.open { display: block; }
.sensory-block { padding: 4px 12px 4px 20px; font-size: 10px; }
.sensory-block .sensory-label { color: var(--dim); font-size: 9px; margin-bottom: 2px; }
.sensory-item { color: var(--dim); padding: 1px 0; }
.sensory-item .s-name { color: var(--text); }
.ctrl-panel { padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 10px; }
.ctrl-panel .ctrl-row { display: flex; gap: 6px; align-items: center; margin: 3px 0; }
.ctrl-panel .ctrl-btn { padding: 2px 8px; border: 1px solid var(--border); border-radius: 3px; background: var(--card); color: var(--dim); cursor: pointer; font-size: 10px; font-family: inherit; }
.ctrl-panel .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
.ctrl-panel .ctrl-btn.take { border-color: var(--gold); color: var(--gold); }
.ctrl-panel .ctrl-btn.release { border-color: var(--green); color: var(--green); }
.ctrl-panel .order-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 3px; color: var(--text); padding: 3px 6px; font-size: 10px; font-family: monospace; }
.ctrl-panel .ctrl-status { color: var(--dim); }
.ctrl-panel .ctrl-status.controlled { color: var(--gold); }
</style>
</head>
<body>
<div class="header">
  <h1>AgentWorld Live</h1>
  <div class="controls">
    <button class="btn warn" id="btn-freeze" onclick="freezeWorld()">⏸ Freeze</button>
    <button class="btn" id="btn-unfreeze" onclick="unfreezeWorld()" style="display:none">▶ Unfreeze</button>
    <span style="font-size:11px;color:var(--dim)" id="agents-count">0 agents</span>
    <span style="font-size:11px;color:var(--dim)" id="events-count">0 events</span>
    <span style="font-size:11px;color:var(--dim)" id="clock">⏱ 00:00</span>
  </div>
</div>
<div class="status-bar" id="status-bar"><span class="dot off"></span> Connecting...</div>
<div class="grid" id="grid"></div>

<script>
const PORT = location.port || '8766';
const cards = {};
let totalEvents = 0;

function api(method, path, body) {
  return fetch('/api' + path, { method, headers: body ? {'Content-Type':'application/json'} : {}, body: body ? JSON.stringify(body) : undefined }).then(r => r.json());
}

async function freezeWorld() {
  await api('POST', '/freeze');
  document.getElementById('btn-freeze').style.display = 'none';
  document.getElementById('btn-unfreeze').style.display = '';
  setStatus('FROZEN', true);
}
async function unfreezeWorld() {
  await api('POST', '/unfreeze');
  document.getElementById('btn-freeze').style.display = '';
  document.getElementById('btn-unfreeze').style.display = 'none';
  setStatus('Live', true);
}
async function takeAgent(agent) {
  await api('POST', '/take/' + agent);
  const card = cards[agent];
  if (card) {
    card.classList.add('controlled');
    const st = card.querySelector('.ctrl-status');
    if (st) { st.textContent = 'CONTROLLED'; st.className = 'ctrl-status controlled'; }
  }
}
async function releaseAgent(agent) {
  await api('POST', '/release/' + agent);
  const card = cards[agent];
  if (card) {
    card.classList.remove('controlled');
    const st = card.querySelector('.ctrl-status');
    if (st) { st.textContent = 'autonomous'; st.className = 'ctrl-status'; }
  }
}
async function orderAgent(agent) {
  const card = cards[agent];
  if (!card) return;
  const input = card.querySelector('.order-input');
  if (!input || !input.value.trim()) return;
  const text = input.value.trim();
  // Support both raw JSON and plain text (plain text → action field)
  let decision;
  try { decision = JSON.parse(text); } catch(e) { decision = {action: text, duration: 4}; }
  await api('POST', '/order/' + agent, { decision });
  input.value = '';
}

function driveColor(v) {
  if (v <= 30) return 'var(--green)';
  if (v <= 60) return 'var(--yellow)';
  if (v <= 80) return 'var(--orange)';
  return 'var(--red)';
}

function ensureCard(agent, zone) {
  if (cards[agent]) return cards[agent];
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `<div class="card-head">
      <span class="name">${agent}</span>
      <span class="zone">${zone}</span>
      <span class="ts">⏱ --</span>
    </div>
    <div class="channel ch-action"><div class="label">action</div><div class="body">--</div></div>
    <div class="channel ch-dialogue"><div class="label">dialogue</div><div class="body">--</div></div>
    <div class="channel ch-drives">
      <div class="label">drives</div>
      <div class="drives-container"><span style="color:var(--dim);font-size:10px">--</span></div>
    </div>
    <div class="input-toggle" onclick="toggleInput(this)">
      <span class="arrow">▶</span> sensory · <span class="sensory-summary">--</span>
    </div>
    <div class="input-body">
      <div class="sensory-block visual-block"><div class="sensory-label">visual</div></div>
      <div class="sensory-block auditory-block"><div class="sensory-label">auditory</div></div>
    </div>
    <div class="ctrl-panel">
      <div class="ctrl-row">
        <button class="ctrl-btn take" onclick="takeAgent('${agent}')">take</button>
        <button class="ctrl-btn release" onclick="releaseAgent('${agent}')">release</button>
        <span class="ctrl-status">autonomous</span>
      </div>
      <div class="ctrl-row">
        <input class="order-input" placeholder='{"action":"...","dialogue":"..."}' onkeydown="if(event.key==='Enter')orderAgent('${agent}')">
        <button class="ctrl-btn" onclick="orderAgent('${agent}')">send</button>
      </div>
    </div>`;
  document.getElementById('grid').appendChild(el);
  cards[agent] = el;
  document.getElementById('agents-count').textContent = Object.keys(cards).length + ' agents';
  return el;
}
function updateDrives(el, drives) {
  const c = el.querySelector('.drives-container');
  const ns = ['hunger','thirst','social','energy','fun','mood'];
  let h = '';
  for (const k of ns) {
    const v = drives[k] != null ? Math.round(drives[k]) : 0;
    h += `<div class="drive-row"><span class="drive-name">${k}</span>
      <div class="drive-bar-outer"><div class="drive-bar-inner" style="width:${Math.max(v,2)}%;background:${driveColor(v)}"></div></div>
      <span class="drive-val">${v}</span></div>`;
  }
  if (drives['coins'] != null) h += `<div class="coins-row">coins: ${drives['coins']}</div>`;
  c.innerHTML = h;
}
function updateSensory(el, visual, auditory) {
  const vB = el.querySelector('.visual-block'), aB = el.querySelector('.auditory-block');
  let vh = '<div class="sensory-label">visual</div>';
  if (visual && visual.length) {
    for (const e of visual) vh += `<div class="sensory-item"><span class="s-name">${e.name}</span> (${e.distance}格) — ${e.look||''}</div>`;
  } else vh += '<div class="sensory-item" style="color:var(--dim)">--</div>';
  vB.innerHTML = vh;
  let ah = '<div class="sensory-label">auditory</div>';
  if (auditory && auditory.length) {
    for (const e of auditory) ah += `<div class="sensory-item"><span class="s-name">${e.name}</span>: "${e.speech||''}"</div>`;
  } else ah += '<div class="sensory-item" style="color:var(--dim)">--</div>';
  aB.innerHTML = ah;
  el.querySelector('.sensory-summary').textContent = 'v:' + (visual?visual.length:0) + ' a:' + (auditory?auditory.length:0);
}
function toggleInput(t) { t.classList.toggle('open'); t.nextElementSibling.classList.toggle('open'); }
function setStatus(text, ok) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = '<span class="dot ' + (ok?'on':'off') + '"></span> ' + text;
  bar.className = 'status-bar' + (ok ? ' ok' : '');
}
function handleEvent(evt) {
  totalEvents++;
  document.getElementById('events-count').textContent = totalEvents + ' events';
  const card = ensureCard(evt.agent, evt.zone || '?');
  if (evt.ts != null) {
    card.querySelector('.ts').textContent = evt.ts.toFixed(1) + 's';
    const m = Math.floor(evt.ts/60), s = Math.floor(evt.ts%60);
    document.getElementById('clock').textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  card.classList.add('flash');
  setTimeout(() => card.classList.remove('flash'), 500);
  if (evt.action_text) {
    const el = card.querySelector('.ch-action .body');
    el.textContent = evt.action_text;
    el.classList.remove('flash-in'); void el.offsetWidth; el.classList.add('flash-in');
  }
  if (evt.dialogue !== undefined) {
    const el = card.querySelector('.ch-dialogue .body');
    el.textContent = evt.dialogue ? '"' + evt.dialogue + '"' : '--';
    el.classList.remove('flash-in'); void el.offsetWidth; el.classList.add('flash-in');
  }
  if (evt.drives) updateDrives(card, evt.drives);
  if (evt.visual || evt.auditory) updateSensory(card, evt.visual, evt.auditory);
}
function connect() {
  setStatus('Connecting...', false);
  const ws = new WebSocket('ws://' + location.hostname + ':' + PORT + '/ws');
  ws.onopen = () => setStatus('Connected · ' + Object.keys(cards).length + ' agents · ' + totalEvents + ' events', true);
  ws.onmessage = (msg) => {
    try {
      const evt = JSON.parse(msg.data);
      if (evt.agent === '_meta') return;
      handleEvent(evt);
      setStatus('Live · ' + Object.keys(cards).length + ' agents · ' + totalEvents + ' events', true);
    } catch(e) { console.error(e); }
  };
  ws.onerror = () => setStatus('Connection error — retrying...', false);
  ws.onclose = () => { setStatus('Disconnected — retrying...', false); setTimeout(connect, 2000); };
}
connect();
</script>
</body>
</html>
